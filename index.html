<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Photo Gallery</title>
	<link rel="stylesheet" href="css/gallery.css">
	<script src = "js/gallery.js"></script>
</head>
<body onload = "setTabIndexes()">
	
	<div id = "image">
		Hover over an image below to display here.
	</div>
	
	<img class = "preview" alt = "Horse rearing up" src = "images/horse1.jpg" onmouseover = "upDate(this)" onmouseleave = "unDo(this)" onfocus = "upDate(this)" onblur = "unDo(this)">

	<img class = "preview" alt = "Three horses running" src = "images/horse2.jpg" onmouseover = "upDate(this)" onmouseleave = "unDo(this)" onfocus = "upDate(this)" onblur = "unDo(this)">
	
	<img class = "preview" src = "images/horse3.jpg" alt = "A white horse showing off" onmouseover = "upDate(this)" onmouseleave = "unDo(this)" onfocus = "upDate(this)" onblur = "unDo(this)">

	<img class = "preview" alt = "Horse looking at you" src = "images/horse4.jpg" onmouseover = "upDate(this)" onmouseleave = "unDo(this)" onfocus = "upDate(this)" onblur = "unDo(this)">
	
	<img class = "preview" alt = "Horse with white face" src = "images/horse5.jpg" onmouseover = "upDate(this)" onmouseleave = "unDo(this)" onfocus = "upDate(this)" onblur = "unDo(this)">
	
	<img class = "preview" src = "images/horse6.jpg" alt = "A herd of wild horses running" onmouseover = "upDate(this)" onmouseleave = "unDo(this)" onfocus = "upDate(this)" onblur = "unDo(this)">

</body>
</html>
